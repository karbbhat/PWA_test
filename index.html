<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headless Controller</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 10px; }
        button { padding: 8px 12px; margin-top: 5px; cursor: pointer; }
        .panel { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold;}
        .idle { background: #e0e0e0; }
        .inprogress { background: #fff3cd; color: #856404; }
        .completed { background: #d4edda; color: #155724; }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h2>Server Controller</h2>
 
    <div class="panel">
        <button onclick="apiCall('GET', '/api/status')">Check Server Status</button>
        <button onclick="apiCall('GET', '/api/files')">List Available Files</button>
    </div>
 
    <div class="panel">
        <h3>Upload File</h3>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload to Server</button>
    </div>
 
    <div class="panel">
        <h3>Load File to External System</h3>
        <input type="text" id="filenameInput" placeholder="Enter filename (e.g. config.json)">
        <button onclick="loadFile()">Trigger Load</button>
        
        <p>Current Load Status: <span id="statusBadge" class="status-badge idle">idle</span></p>
    </div>
 
    <pre id="output">System Ready...</pre>
    
    <div class="panel" style="font-size: 0.9em; color: #666;">
        <p>First time here? <a href="../client.p12" download>Download Client Certificate</a> (Password: test)</p>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg.scope))
                    .catch(err => console.error('Service Worker Registration Failed!', err));
            });
        }
        
        const API_BASE = 'https://localhost:4443';
        const output = document.getElementById('output');
        const statusBadge = document.getElementById('statusBadge');
        let pollTimer = null;
 
        function log(data) {
            output.innerText = JSON.stringify(data, null, 2);
        }
 
        async function apiCall(method, endpoint, body = null, headers = {}) {
            try {
                const config = {
                    method: method,
                    credentials: 'include', // Mandates sending the mTLS certificate
                    headers: headers
                };
                if (body) config.body = body;
 
                const response = await fetch(`${API_BASE}${endpoint}`, config);
                const data = await response.json();
                log(data);
                return data;
            } catch (err) {
                log({ error: err.message, note: "Check if server is running and cert is accepted." });
            }
        }
 
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) return alert("Select a file first!");
            const file = fileInput.files[0];
            
            // Send the raw file directly in the body, put name in header
            await apiCall('POST', '/api/upload', file, {
                'X-File-Name': file.name,
                'Content-Type': 'application/octet-stream'
            });
        }
 
        async function loadFile() {
            const filename = document.getElementById('filenameInput').value;
            if (!filename) return alert("Enter a filename to load.");
            
            const res = await apiCall('POST', '/api/load', JSON.stringify({ filename }), {
                'Content-Type': 'application/json'
            });
 
            if (res && res.status === 'inprogress') {
                startPolling();
            }
        }
 
        function updateBadge(status) {
            statusBadge.innerText = status;
            statusBadge.className = `status-badge ${status}`;
        }
 
        async function startPolling() {
            if (pollTimer) clearTimeout(pollTimer);
            
            const res = await apiCall('GET', '/api/poll');
            if (res && res.load_status) {
                updateBadge(res.load_status);
                
                // If it is still in progress, poll again in 2 seconds
                if (res.load_status === 'inprogress') {
                    pollTimer = setTimeout(startPolling, 2000);
                } else if (res.load_status === 'completed') {
                    // Reset server status to idle after completion so we can run it again
                    setTimeout(() => updateBadge('idle'), 5000);
                }
            }
        }
    </script>
</body>
</html>
